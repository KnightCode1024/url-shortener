services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - .:/app
    working_dir: /app
    environment:
      PYTHONPATH: /app/src
      POSTGRES_USER: ${POSTGRES_USER:-flower_shop_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-12345678}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_NAME: ${POSTGRES_NAME:-flower_shop_db}
    command: sh -c "alembic upgrade head && uvicorn url_shortener_api.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_net

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_NAME:-flower_shop_db}
      POSTGRES_USER: ${POSTGRES_USER:-flower_shop_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-12345678}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_net

networks:
  app_net:
    driver: bridge

volumes:
  postgres-data:
